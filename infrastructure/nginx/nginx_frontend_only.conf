# Nginx config for frontend-only deployment (no backend proxy)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Runtime config should never be cached
    location = /js/runtime-env.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API config should never be cached
    location = /js/config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* \.(jpg|jpeg|png|gif|svg|css|js|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Backend không chạy trên VPS/container này
    location /api/ {
        return 404;
    }

    location /uploads/ {
        return 404;
    }
}
