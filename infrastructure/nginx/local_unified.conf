# Nginx Configuration for MedAI Dermatology - Local System (Ubuntu)
# Supports both 'localhost' and 'khangjv.id.vn' (for local testing)

server {
    listen 80;
    server_name localhost khangjv.id.vn;

    # Root directory for frontend static files
    # Cần đảm bảo đường dẫn này chính xác trên máy của bạn
    root /home/khangjv/WorkSpace/MedAI_Dermatology/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Backend API - Proxy sang Gunicorn/Uvicorn (port 8000)
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cấu hình upload file lớn
        client_max_body_size 15M;
        proxy_read_timeout 300s;
    }

    # Dẫn luồng /uploads từ backend
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000/uploads/;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }
}
