# Nginx config dùng trong Docker (frontend container)
# Proxy /api/ → backend container, serve static files
# File này khác với medai_nginx.conf (dùng cho local dev không Docker)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Frontend static files
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Use Docker embedded DNS to prevent startup crash if backend is slow
    resolver 127.0.0.11 valid=30s;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|svg|css|js|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API to backend container
    location /api/ {
        set $backend_api "http://medai_backend:8000";
        proxy_pass $backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    # Proxy uploads to backend
    location ^~ /uploads/ {
        set $backend_uploads "http://medai_backend:8000";
        proxy_pass $backend_uploads;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        set $backend_health "http://medai_backend:8000/health";
        proxy_pass $backend_health;
    }
}
