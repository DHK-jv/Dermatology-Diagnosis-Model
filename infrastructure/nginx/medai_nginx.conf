# Nginx Configuration for MedAI Dermatology (Local)
# Usage:
# 1. Copy or link this file to /etc/nginx/sites-enabled/medai_dermatology
#    sudo ln -s /home/khangjv/WorkSpace/MedAI_Dermatology/nginx/medai_nginx.conf /etc/nginx/sites-enabled/medai_dermatology
# 2. Test config: sudo nginx -t
# 3. Reload nginx: sudo systemctl reload nginx

server {
    listen 80;
    server_name localhost;
    
    # Root directory for frontend
    root /home/khangjv/WorkSpace/MedAI_Dermatology/frontend;
    index index.html;

    # Frontend - Static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API - Reverse Proxy to Uvicorn
    location /api/v1/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Upload size limit
        client_max_body_size 10M;
    }

    # Uploads (từ backend)
    location /uploads/ {
        proxy_pass http://localhost:8000/uploads/;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://localhost:8000/health;
        proxy_set_header Host $host;
    }

    # Runtime config should never be cached
    location = /js/runtime-env.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Static assets caching
    location ~* \.(jpg|jpeg|png|css|js)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}
