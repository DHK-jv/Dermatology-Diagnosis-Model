# Nginx Configuration for MedAI Dermatology - VPS Production
# Domain: khangjv.id.vn

server {
    listen 80;
    server_name khangjv.id.vn;

    # Chuyển hướng HTTP sang HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name khangjv.id.vn;

    # SSL Configuration (Certbot sẽ tự động điền các đường dẫn này)
    # ssl_certificate /etc/letsencrypt/live/khangjv.id.vn/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/khangjv.id.vn/privkey.pem;

    # Tối ưu hóa bảo mật
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Frontend - Tĩnh (frontend-only)
    root /var/www/medai_dermatology/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # Runtime config should never be cached
    location = /js/runtime-env.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Static Assets (Images, JS, CSS)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Không proxy backend tại VPS này (backend chạy trên Render)
    location /api/ {
        return 404;
    }

    location /uploads/ {
        return 404;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
