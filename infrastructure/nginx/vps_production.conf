# Nginx Configuration for MedAI Dermatology - VPS Production
# Domain: khangjv.id.vn

server {
    listen 80;
    server_name khangjv.id.vn;

    # Chuyển hướng HTTP sang HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name khangjv.id.vn;

    # SSL Configuration (Certbot sẽ tự động điền các đường dẫn này)
    # ssl_certificate /etc/letsencrypt/live/khangjv.id.vn/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/khangjv.id.vn/privkey.pem;

    # Tối ưu hóa bảo mật
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Frontend - Tĩnh
    root /var/www/medai_dermatology/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # Static Assets (Images, JS, CSS)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Backend API - Proxy sang FastAPI
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cấu hình upload file lớn
        client_max_body_size 15M;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # Uploads (Ảnh tĩnh từ backend)
    location /uploads {
        proxy_pass http://127.0.0.1:8000/uploads;
        proxy_set_header Host $host;
        expires 7d;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
