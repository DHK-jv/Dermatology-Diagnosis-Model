# ============================================================
# Docker Compose - MedAI Dermatology (Frontend-only Production)
# ============================================================

name: medai-dermatology-frontend

services:
  frontend:
    build:
      context: ..
      dockerfile: infrastructure/docker/frontend.Dockerfile
    container_name: medai_frontend
    restart: unless-stopped

    environment:
      - API_BASE_URL=${API_BASE_URL:-https://dermatology-diagnosis-model.onrender.com}

    volumes:
      - ./nginx/nginx_frontend_only.conf:/etc/nginx/conf.d/default.conf:ro

    ports:
      - "${FRONTEND_PORT:-80}:80"
