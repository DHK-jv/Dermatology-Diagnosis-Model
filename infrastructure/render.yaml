services:
  - type: web
    name: medai-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: ".."
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: USE_MONGODB
        value: "false"
