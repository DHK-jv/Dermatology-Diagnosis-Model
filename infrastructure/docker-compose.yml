version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: medai_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${DATABASE_NAME:-medai_dermatology}
    volumes:
      - mongodb_data:/data/db
    networks:
      - medai_network

  # Backend API (FastAPI)
  backend:
    build: ../backend
    container_name: medai_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/
      - DATABASE_NAME=${DATABASE_NAME:-medai_dermatology}
    volumes:
      - ../backend/ml_models:/app/ml_models:ro
    depends_on:
      - mongodb
    networks:
      - medai_network

  # Nginx Gateway  
  nginx:
    image: nginx:alpine
    container_name: medai_nginx
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - medai_network

volumes:
  mongodb_data:
    driver: local

networks:
  medai_network:
    driver: bridge
