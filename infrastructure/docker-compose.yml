# ============================================================
# Docker Compose - MedAI Dermatology
# ============================================================
# Usage (local dev):
#   docker compose -f infrastructure/docker-compose.yml up -d          # Start all services
#   docker compose -f infrastructure/docker-compose.yml logs -f        # View logs
#   docker compose -f infrastructure/docker-compose.yml down           # Stop all services
#   docker compose -f infrastructure/docker-compose.yml down -v        # Stop and remove volumes
# ============================================================

name: medai-dermatology

services:

  # ── Backend: FastAPI + PyTorch ──────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: medai_backend
    restart: unless-stopped

    environment:
      - PYTHONUNBUFFERED=1
      - USE_MONGODB=${USE_MONGODB:-false}
      - MONGODB_URL=${MONGODB_URL:-}

    volumes:
      - ../backend/ml_models:/app/ml_models:ro # model weights (read-only)
      - uploads_data:/app/uploads # persistent uploads

    expose:
      - "8000"
    ports:
      - "8000:8000" # Expose to host for debugging/direct access

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - medai_network
    # GPU (uncomment nếu có nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Frontend: Nginx serving static files (local dev) ───────
  frontend:
    build:
      context: ..
      dockerfile: infrastructure/docker/frontend.Dockerfile
    container_name: medai_frontend
    restart: unless-stopped
    environment:
      - API_BASE_URL=${API_BASE_URL:-}

    # Map host port 80 to container port 80
    # Mount nginx config từ infrastructure/nginx/
    volumes:
      - ./nginx/nginx_docker.conf:/etc/nginx/conf.d/default.conf:ro

    ports:
      - "${FRONTEND_PORT:-8080}:80"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - medai_network

# ── Volumes ─────────────────────────────────────────────────
volumes:
  uploads_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────
networks:
  medai_network:
    driver: bridge
