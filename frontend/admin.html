<!DOCTYPE html>
<html lang="vi" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MedAI Dermatology</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <!-- Tailwind CSS (CDN for demo, in production use built version) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#007fff',
                            hover: '#0066cc',
                            light: '#e6f2ff'
                        },
                        secondary: '#f8f9fa'
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-[#f8f9fa] dark:bg-[#0f1923] text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <!-- Global Loader (Hidden by default) -->
    <div id="global-loader"
        class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-8 shadow-2xl flex flex-col items-center gap-4 max-w-sm">
            <div class="animate-spin rounded-full h-16 w-16 border-4 border-primary border-t-transparent"></div>
            <p id="loader-message" class="text-slate-700 dark:text-slate-200 font-medium text-center">Đang tải...</p>
        </div>
    </div>

    <!-- Navbar -->
    <nav
        class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 transition-colors">
        <div class="max-w-[1440px] mx-auto px-6 h-16 flex justify-between items-center">
            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-3">
                <div
                    class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined">dermatology</span>
                </div>
                <span class="font-bold text-xl tracking-tight text-slate-900 dark:text-white">Med<span
                        class="text-primary">AI</span> Admin</span>
            </a>

            <!-- User Menu -->
            <div class="flex items-center gap-4">
                <a href="history.html"
                    class="flex items-center gap-2 text-slate-600 hover:text-primary transition font-medium text-sm mr-4">
                    <span class="material-symbols-outlined text-[20px]">history</span>
                    Xem Lịch Sử Chung
                </a>
                <div class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center font-bold text-sm"
                    id="admin-avatar">
                    A
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-[1440px] mx-auto px-6 py-10">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white flex items-center gap-3">
                <span class="material-symbols-outlined text-primary text-4xl">dashboard</span>
                Dashboard Quản Trị
            </h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2">Tổng quan hệ thống và quản lý tài khoản người dùng.</p>
        </div>

        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10" id="stats-container">
            <!-- Rendered by JS -->
            <div
                class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700 animate-pulse">
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/2 mb-4"></div>
                <div class="h-10 bg-gray-200 dark:bg-gray-700 rounded w-1/3"></div>
            </div>
            <!-- ... more skeleton ... -->
        </div>

        <!-- User Management Table -->
        <div
            class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
            <div class="p-6 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center">
                <h2 class="text-xl font-bold text-slate-800 dark:text-gray-100 flex items-center gap-2">
                    <span class="material-symbols-outlined text-purple-500">group</span>
                    Danh Sách Người Dùng
                </h2>

                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">search</span>
                    <input type="text" id="user-search" placeholder="Tìm tên user..."
                        class="pl-9 pr-4 py-2 border border-gray-200 dark:border-gray-700 dark:bg-slate-900 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:outline-none">
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50/50 dark:bg-slate-900/50">
                            <th
                                class="px-6 py-4 font-semibold text-sm text-gray-500 dark:text-gray-400 border-b border-gray-100 dark:border-gray-700">
                                Username</th>
                            <th
                                class="px-6 py-4 font-semibold text-sm text-gray-500 dark:text-gray-400 border-b border-gray-100 dark:border-gray-700">
                                Họ và Tên</th>
                            <th
                                class="px-6 py-4 font-semibold text-sm text-gray-500 dark:text-gray-400 border-b border-gray-100 dark:border-gray-700">
                                Vai Trò</th>
                            <th
                                class="px-6 py-4 font-semibold text-sm text-gray-500 dark:text-gray-400 border-b border-gray-100 dark:border-gray-700">
                                Ngày Tạo</th>
                            <th
                                class="px-6 py-4 font-semibold text-sm text-gray-500 dark:text-gray-400 border-b border-gray-100 dark:border-gray-700 text-right">
                                Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <!-- Rendered via JS -->
                        <tr>
                            <td colspan="5" class="px-6 py-12 text-center text-gray-500">
                                Đang tải danh sách...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/runtime-env.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
